<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桌面计时器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, sans-serif;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
      color: #ffffff;
      width: 400px;
      height: 500px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
    }

    /* ===== 顶部栏 ===== */
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px 6px;
    }

    .app-title {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
    }

    .pin-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .pin-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.85);
    }

    .pin-btn.active {
      background: rgba(255,215,0,0.15);
      border-color: rgba(255,215,0,0.4);
      color: #ffd700;
    }

    .pin-btn .pin-icon {
      font-size: 13px;
      transition: transform 0.2s;
    }

    .pin-btn.active .pin-icon {
      transform: rotate(-45deg);
    }

    /* ===== 模式切换 ===== */
    .mode-switch {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      padding: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .mode-btn {
      padding: 6px 18px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-weight: 500;
    }

    .mode-btn:hover {
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.05);
    }

    .mode-btn.active {
      background: rgba(255,255,255,0.12);
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* ===== 计时显示区 ===== */
    .timer-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 0 20px;
    }

    .timer-display {
      font-size: 56px;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      color: #ffffff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
      transition: color 0.3s ease;
    }

    .timer-display.paused {
      color: rgba(255,255,255,0.5);
    }

    .timer-display.finished {
      color: #ff6b6b;
      animation: pulse-glow 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse-glow {
      from { text-shadow: 0 2px 12px rgba(255,107,107,0.3); }
      to   { text-shadow: 0 2px 24px rgba(255,107,107,0.8); }
    }

    .timer-label {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      margin-top: 6px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ===== 时间设置区 ===== */
    .settings-panel {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      margin-top: 20px;
      transition: opacity 0.3s ease, max-height 0.3s ease, margin 0.3s ease;
      opacity: 1;
      max-height: 80px;
    }

    .settings-panel.hidden {
      opacity: 0;
      max-height: 0;
      margin-top: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .input-group label {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
    }

    .time-input {
      width: 52px;
      height: 42px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #ffffff;
      text-align: center;
      font-size: 20px;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
      outline: none;
      transition: all 0.2s ease;
    }

    .time-input:focus {
      border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
    }

    .time-input:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .time-input::-webkit-outer-spin-button,
    .time-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .input-colon {
      font-size: 18px;
      color: rgba(255,255,255,0.2);
      padding-bottom: 8px;
    }

    /* ===== 控制按钮区 ===== */
    .controls {
      display: flex;
      gap: 20px;
      margin-top: 30px;
      margin-bottom: 30px;
    }

    .control-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: all 0.2s ease;
      color: #ffffff;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }

    .control-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.1);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .control-btn:hover::after {
      opacity: 1;
    }

    .control-btn:active {
      transform: scale(0.93);
    }

    .control-btn .btn-icon {
      font-size: 22px;
      line-height: 1;
    }

    .control-btn .btn-text {
      font-size: 10px;
      letter-spacing: 1px;
    }

    .btn-start {
      background: linear-gradient(135deg, #00c9a7, #00a8e8);
      box-shadow: 0 4px 16px rgba(0,201,167,0.25);
    }

    .btn-pause {
      background: linear-gradient(135deg, #feca57, #ff9f43);
      box-shadow: 0 4px 16px rgba(254,202,87,0.25);
    }

    .btn-reset {
      background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
      box-shadow: 0 4px 16px rgba(255,107,107,0.25);
    }

    .control-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
    }

    .control-btn:disabled::after {
      display: none;
    }

    /* ===== 状态提示 ===== */
    .status-bar {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      height: 18px;
      margin-bottom: 16px;
      transition: color 0.3s ease;
    }

    .status-bar.alert {
      color: #ff6b6b;
      font-weight: 500;
    }

    /* ===== 全局闪烁提醒 ===== */
    @keyframes screen-flash {
      0%, 100% { background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%); }
      50%      { background: linear-gradient(145deg, #3a1a2e 0%, #4a1620 100%); }
    }

    .flash-alert {
      animation: screen-flash 0.5s ease-in-out infinite;
    }
  </style>
</head>
<body id="app-body">

  <div class="top-bar">
    <span class="app-title">DESKTOP TIMER</span>
    <button class="pin-btn" id="pinBtn" title="窗口置顶">
      <span class="pin-icon">📌</span>
      <span id="pinText">置顶</span>
    </button>
  </div>

  <div class="mode-switch">
    <button class="mode-btn active" data-mode="countdown">倒计时</button>
    <button class="mode-btn" data-mode="stopwatch">正计时</button>
  </div>

  <div class="timer-section">
    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <div class="timer-label" id="timerLabel">COUNTDOWN</div>

    <div class="settings-panel" id="settingsPanel">
      <div class="input-group">
        <label>时</label>
        <input type="number" class="time-input" id="inputHour" min="0" max="99" value="0" placeholder="00">
      </div>
      <span class="input-colon">:</span>
      <div class="input-group">
        <label>分</label>
        <input type="number" class="time-input" id="inputMin" min="0" max="59" value="0" placeholder="00">
      </div>
      <span class="input-colon">:</span>
      <div class="input-group">
        <label>秒</label>
        <input type="number" class="time-input" id="inputSec" min="0" max="59" value="0" placeholder="00">
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="control-btn btn-start" id="btnStart">
      <span class="btn-icon">▶</span>
      <span class="btn-text">开始</span>
    </button>
    <button class="control-btn btn-pause" id="btnPause" disabled>
      <span class="btn-icon">⏸</span>
      <span class="btn-text">暂停</span>
    </button>
    <button class="control-btn btn-reset" id="btnReset">
      <span class="btn-icon">↺</span>
      <span class="btn-text">重置</span>
    </button>
  </div>

  <div class="status-bar" id="statusBar">准备就绪</div>

  <script>
    const { ipcRenderer } = require('electron');

    /* ========== DOM 引用 ========== */
    const body = document.getElementById('app-body');
    const display = document.getElementById('timerDisplay');
    const timerLabel = document.getElementById('timerLabel');
    const statusBar = document.getElementById('statusBar');
    const pinBtn = document.getElementById('pinBtn');
    const pinText = document.getElementById('pinText');
    const settingsPanel = document.getElementById('settingsPanel');

    const btnStart = document.getElementById('btnStart');
    const btnPause = document.getElementById('btnPause');
    const btnReset = document.getElementById('btnReset');

    const modeBtns = document.querySelectorAll('.mode-btn');
    const inputHour = document.getElementById('inputHour');
    const inputMin = document.getElementById('inputMin');
    const inputSec = document.getElementById('inputSec');

    /* ========== 状态变量 ========== */
    let mode = 'countdown';        // 'countdown' | 'stopwatch'
    let isRunning = false;         // 是否正在运行
    let isPaused = false;          // 是否处于暂停状态
    let intervalId = null;         // 更新定时器

    // ---- 时间戳差值核心变量 ----
    let startTimestamp = 0;        // 本次开始/恢复时的 Date.now() 时间戳
    let elapsedAccumulated = 0;    // 正计时：暂停前已累积的毫秒数
    let remainingAccumulated = 0;  // 倒计时：暂停前剩余的毫秒数
    let totalTargetMs = 0;       // 倒计时设定的总目标毫秒数

    /* ========== 格式化工具 ========== */
    function formatMs(ms) {
      const totalSeconds = Math.max(0, Math.floor(ms / 1000));
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      return String(h).padStart(2, '0') + ':' +
             String(m).padStart(2, '0') + ':' +
             String(s).padStart(2, '0');
    }

    function getInputMs() {
      const h = parseInt(inputHour.value, 10) || 0;
      const m = parseInt(inputMin.value, 10) || 0;
      const s = parseInt(inputSec.value, 10) || 0;
      return (h * 3600 + m * 60 + s) * 1000;
    }

    /* ========== 核心计时逻辑（时间戳差值） ========== */
    function updateTimer() {
      const now = Date.now();

      if (mode === 'stopwatch') {
        // 正计时：累积量 + (当前时间戳 - 开始时间戳)
        const elapsed = elapsedAccumulated + (now - startTimestamp);
        display.textContent = formatMs(elapsed);
      } else {
        // 倒计时：剩余量 - (当前时间戳 - 开始时间戳)
        const remaining = remainingAccumulated - (now - startTimestamp);
        if (remaining <= 0) {
          display.textContent = '00:00:00';
          onTimerFinish();
        } else {
          display.textContent = formatMs(remaining);
        }
      }
    }

    /* ========== 开始计时 ========== */
    function startTimer() {
      if (isRunning) return;

      // 停止任何之前的提醒效果
      stopAlertEffects();

      if (mode === 'countdown') {
        if (!isPaused) {
          // 全新开始：从输入框读取目标时间
          totalTargetMs = getInputMs();
          if (totalTargetMs <= 0) {
            setStatus('请先设置倒计时时长', true);
            return;
          }
          remainingAccumulated = totalTargetMs;
        }
        // 记录开始时间戳
        startTimestamp = Date.now();
        timerLabel.textContent = 'COUNTDOWN';
        setStatus('倒计时运行中...');
      } else {
        if (!isPaused) {
          elapsedAccumulated = 0;
        }
        startTimestamp = Date.now();
        timerLabel.textContent = 'STOPWATCH';
        setStatus('正计时运行中...');
      }

      isRunning = true;
      isPaused = false;
      display.classList.remove('paused', 'finished');

      // 更新频率 100ms（平衡性能与流畅度）
      intervalId = setInterval(updateTimer, 100);
      updateTimer(); // 立即更新一次，避免延迟

      updateButtonStates();
      lockInputs(true);
    }

    /* ========== 暂停计时 ========== */
    function pauseTimer() {
      if (!isRunning) return;

      clearInterval(intervalId);
      const now = Date.now();

      if (mode === 'stopwatch') {
        // 正计时：累加已运行时间到 accumulated
        elapsedAccumulated += (now - startTimestamp);
      } else {
        // 倒计时：减去已运行时间，得到新的剩余量
        remainingAccumulated -= (now - startTimestamp);
        remainingAccumulated = Math.max(0, remainingAccumulated);
      }

      isRunning = false;
      isPaused = true;
      display.classList.add('paused');
      setStatus('已暂停');
      updateButtonStates();
    }

    /* ========== 重置计时 ========== */
    function resetTimer() {
      clearInterval(intervalId);
      isRunning = false;
      isPaused = false;
      intervalId = null;
      startTimestamp = 0;
      elapsedAccumulated = 0;
      remainingAccumulated = 0;
      totalTargetMs = 0;

      stopAlertEffects();
      display.classList.remove('paused', 'finished');
      lockInputs(false);
      updateButtonStates();

      if (mode === 'stopwatch') {
        display.textContent = '00:00:00';
        setStatus('准备开始正计时');
      } else {
        display.textContent = formatMs(getInputMs());
        setStatus('请设置倒计时时间');
      }
    }

    /* ========== 计时结束处理 ========== */
    function onTimerFinish() {
      clearInterval(intervalId);
      isRunning = false;
      isPaused = false;
      intervalId = null;
      startTimestamp = 0;
      elapsedAccumulated = 0;
      remainingAccumulated = 0;

      display.classList.add('finished');
      setStatus('时间到！', true);
      lockInputs(false);
      updateButtonStates();

      // 播放提示音
      playBeepSound();

      // 触发系统通知
      ipcRenderer.send('show-notification', {
        title: '计时器提醒',
        body: '倒计时已结束！'
      });

      // 界面闪烁提醒（3 秒）
      body.classList.add('flash-alert');
      setTimeout(() => body.classList.remove('flash-alert'), 3000);
    }

    /* ========== Web Audio API 蜂鸣声 ========== */
    function playBeepSound() {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioCtx();

        // 第一声（高）
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.type = 'sine';
        osc1.frequency.value = 880; // A5
        gain1.gain.value = 0.25;
        osc1.start();
        gain1.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.2);
        osc1.stop(ctx.currentTime + 1.2);

        // 第二声（更高，延时 250ms）
        setTimeout(() => {
          const osc2 = ctx.createOscillator();
          const gain2 = ctx.createGain();
          osc2.connect(gain2);
          gain2.connect(ctx.destination);
          osc2.type = 'sine';
          osc2.frequency.value = 1100;
          gain2.gain.value = 0.25;
          osc2.start();
          gain2.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.2);
          osc2.stop(ctx.currentTime + 1.2);
        }, 250);

        // 第三声（最高，延时 500ms）
        setTimeout(() => {
          const osc3 = ctx.createOscillator();
          const gain3 = ctx.createGain();
          osc3.connect(gain3);
          gain3.connect(ctx.destination);
          osc3.type = 'sine';
          osc3.frequency.value = 1320;
          gain3.gain.value = 0.25;
          osc3.start();
          gain3.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.5);
          osc3.stop(ctx.currentTime + 1.5);
        }, 500);
      } catch (e) {
        console.error('Audio play failed:', e);
      }
    }

    /* ========== 模式切换 ========== */
    function setMode(newMode) {
      if (newMode === mode) return;
      resetTimer();
      mode = newMode;

      modeBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === newMode);
      });

      if (mode === 'stopwatch') {
        settingsPanel.classList.add('hidden');
        timerLabel.textContent = 'STOPWATCH';
        display.textContent = '00:00:00';
        setStatus('准备开始正计时');
      } else {
        settingsPanel.classList.remove('hidden');
        timerLabel.textContent = 'COUNTDOWN';
        display.textContent = formatMs(getInputMs());
        setStatus('请设置倒计时时间');
      }
    }

    /* ========== 置顶按钮 ========== */
    let isPinned = false;
    function togglePin() {
      isPinned = !isPinned;
      pinBtn.classList.toggle('active', isPinned);
      pinText.textContent = isPinned ? '已置顶' : '置顶';
      ipcRenderer.send('toggle-always-on-top', isPinned);
    }

    /* ========== UI 辅助函数 ========== */
    function setStatus(text, isAlert = false) {
      statusBar.textContent = text;
      statusBar.classList.toggle('alert', isAlert);
    }

    function stopAlertEffects() {
      body.classList.remove('flash-alert');
      display.classList.remove('finished');
      statusBar.classList.remove('alert');
    }

    function updateButtonStates() {
      btnStart.disabled = isRunning;
      btnPause.disabled = !isRunning;
      // 重置按钮始终可用
    }

    function lockInputs(locked) {
      inputHour.disabled = locked;
      inputMin.disabled = locked;
      inputSec.disabled = locked;
    }

    /* ========== 输入框处理 ========== */
    function clampInput(el, maxVal) {
      let v = parseInt(el.value, 10);
      if (isNaN(v) || v < 0) v = 0;
      if (v > maxVal) v = maxVal;
      el.value = v;

      if (mode === 'countdown' && !isRunning && !isPaused) {
        display.textContent = formatMs(getInputMs());
      }
    }

    [inputHour, inputMin, inputSec].forEach(input => {
      input.addEventListener('input', () => {
        const max = input === inputHour ? 99 : 59;
        clampInput(input, max);
      });

      input.addEventListener('blur', () => {
        const max = input === inputHour ? 99 : 59;
        clampInput(input, max);
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          startTimer();
        }
      });
    });

    /* ========== 事件绑定 ========== */
    btnStart.addEventListener('click', startTimer);
    btnPause.addEventListener('click', pauseTimer);
    btnReset.addEventListener('click', resetTimer);
    pinBtn.addEventListener('click', togglePin);

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => setMode(btn.dataset.mode));
    });

    /* ========== 初始化 ========== */
    display.textContent = formatMs(getInputMs());
    setStatus('请设置倒计时时间');
  </script>
</body>
</html>
